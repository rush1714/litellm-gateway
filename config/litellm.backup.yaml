general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"
litellm_settings:
  drop_params: true
########################################################
model_list:
  ########################################################
  #
  # Claude Code 默认 Sonnet
  #
  ########################################################
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: openai/gpt-5.5-gus
      api_base: "os.environ/ICA_BASE"
      api_key: "os.environ/ICA_KEY"
  ########################################################
  - model_name: claude-opus-4-5
    litellm_params:
      model: openai/gpt-5.4-gus
      api_base: "os.environ/ICA_BASE"
      api_key: "os.environ/ICA_KEY"
  ########################################################
  - model_name: claude-haiku-4-5
    litellm_params:
      model: openai/gemini-3.5-flash
      api_base: "os.environ/ICA_BASE"
      api_key: "os.environ/ICA_KEY"
  ########################################################
  #
  # 自定义模型
  #
  ########################################################
  - model_name: gpt-best
    litellm_params:
      model: openai/gpt-5.4-gus
      api_base: "os.environ/ICA_BASE"
      api_key: "os.environ/ICA_KEY"
  ########################################################
  - model_name: gpt-fast
    litellm_params:
      model: openai/gpt-5.1-chat-gus
      api_base: "os.environ/ICA_BASE"
      api_key: "os.environ/ICA_KEY"
  ########################################################
  - model_name: gemini
    litellm_params:
      model: openai/gemini-3.5-flash
      api_base: "os.environ/ICA_BASE"
      api_key: "os.environ/ICA_KEY"
  ########################################################
  - model_name: granite
    litellm_params:
      model: openai/ibm/granite-4-h-small
      api_base: "os.environ/ICA_BASE"
      api_key: "os.environ/ICA_KEY"
  ########################################################
  - model_name: llama
    litellm_params:
      model: openai/meta-llama/llama-4-maverick-17b-128e-instruct-fp8
      api_base: "os.environ/ICA_BASE"
      api_key: "os.environ/ICA_KEY"
router_settings:
  retries: 2
  timeout: 180
  fallbacks:
    - { "claude-sonnet-4-5": [ "gemini","granite","llama" ] }